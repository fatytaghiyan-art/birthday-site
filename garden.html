<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>باغ خاطرات ما 🌿</title>

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Tahoma, Arial, sans-serif;

            background: linear-gradient(
                180deg,
                #ffdce8,
                #f5b4ca,
                #c97899
            );

            color: #6d3049;
            text-align: center;
        }

        h1 {
            padding-top: 50px;
            color: #7c294d;
        }

        .garden {
            width: 90%;
            max-width: 800px;
            height: 500px;

            margin: 30px auto;

            position: relative;

            border-radius: 40px;

            background: linear-gradient(
                180deg,
                #f8c9d8,
                #d88ca8
            );

            box-shadow:
                0 20px 50px
                rgba(100, 30, 65, 0.3);
        }

        .tree {
            position: absolute;
            bottom: 20px;
            font-size: 100px;
        }

        .left {
            left: 20px;
        }

        .right {
            right: 20px;
        }

        .item {
            position: absolute;

            width: 120px;
            height: 120px;

            border: none;
            border-radius: 50%;

            background: rgba(255,255,255,0.5);

            font-size: 45px;

            cursor: pointer;

            transition: 0.3s;
        }

        .item:hover {
            transform: scale(1.1);
        }

        .balloon {
            top: 80px;
            left: 15%;
        }

        .puzzle {
            top: 200px;
            right: 15%;
        }

        .letter {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

    </style>

</head>

<body>

    <h1>
        🌿 باغ خاطرات ما 🌿
    </h1>

    <p>
        اینجا یه گوشه کوچیک از دنیای ماست...
    </p>

    <div class="garden">

        <div class="tree left">
            🌳
        </div>

        <div class="tree right">
            🌳
        </div>

        <button class="item balloon">
            🎈
        </button>

        <button class="item puzzle">
            🧩
        </button>

        <button class="item letter">
            💌
        </button>

    </div>

</body>

</html>
